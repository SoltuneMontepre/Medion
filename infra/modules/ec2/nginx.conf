events {
    worker_connections 1024;
}

http {
    upstream keycloak_server {
        server keycloak:8080;
    }

    server {
        listen 80;
        server_name keycloak.soltunemontepre.tech;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name keycloak.soltunemontepre.tech;

        ssl_certificate /etc/letsencrypt/live/keycloak.soltunemontepre.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/keycloak.soltunemontepre.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://keycloak_server;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
